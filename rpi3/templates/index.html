<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RPI3 Parking Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="dashboard">
        <section class="status-strip">
            <div>
                <span class="label">Slot 1</span>
                <strong id="slot1-state">UNKNOWN</strong>
            </div>
            <div>
                <span class="label">Slot 2</span>
                <strong id="slot2-state">UNKNOWN</strong>
            </div>
            <div>
                <span class="label">Parking Lot</span>
                <strong id="lot-state">UNKNOWN</strong>
            </div>
            <div>
                <span class="label">Gate</span>
                <strong id="gate-state">UNKNOWN</strong>
            </div>
        </section>

        <section class="content">
            <div class="parking-area">
                <div class="entrance">
                    <span class="entrance-label">Entrance Gate</span>
                    <div id="gate" class="gate closed"></div>
                </div>

                <div class="slot-area">
                    <div id="slot1" class="slot unknown">
                        <span class="slot-title">Slot 1</span>
                        <span id="slot1-distance" class="slot-distance">-</span>
                    </div>

                    <div id="slot2" class="slot unknown">
                        <span class="slot-title">Slot 2</span>
                        <span id="slot2-distance" class="slot-distance">-</span>
                    </div>
                </div>
            </div>

            <aside class="panel">
                <h1>Parking Monitor</h1>

                <dl class="metrics">
                    <div>
                        <dt>Slot 1 Distance</dt>
                        <dd id="metric-slot1-distance">-</dd>
                    </div>
                    <div>
                        <dt>Slot 2 Distance</dt>
                        <dd id="metric-slot2-distance">-</dd>
                    </div>
                    <div>
                        <dt>Last Updated</dt>
                        <dd id="last-updated">-</dd>
                    </div>
                    <div>
                        <dt>MQTT</dt>
                        <dd id="mqtt-status">DISCONNECTED</dd>
                    </div>
                    <div>
                        <dt>Last MQTT Topic</dt>
                        <dd id="last-mqtt-topic">-</dd>
                    </div>
                    <div>
                        <dt>Last MQTT Payload</dt>
                        <dd id="last-mqtt-payload">-</dd>
                    </div>
                </dl>

                <h2>Events</h2>
                <ul id="events" class="events"></ul>
            </aside>
        </section>
    </main>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="{{ url_for('static', filename='dashboard.js') }}?v=mqtt-ws-only"></script>
</body>
</html>
